<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paramètres - JUCY ACADEMIE</title>
  <link rel="stylesheet" href="dashboard.css">
    <link rel="icon" type="image/x-icon" href="logo.jpg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<style>
/* Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #f5f6fa;
  color: #333;
  display: flex;
}

/* Sidebar (reprend le style du dashboard) */
.sidebar {
  width: 250px;
  background: #1e3c72;
  color: white;
  min-height: 100vh;
  position: fixed;
  left: 0;
  top: 0;
  padding: 20px;
}

.sidebar .logo {
  text-align: center;
  margin-bottom: 30px;
}

.sidebar .logo img {
  width: 80px;
  border-radius: 50%;
}

.sidebar .logo h2 {
  font-size: 18px;
  margin-top: 10px;
}

.sidebar .menu {
  list-style: none;
}

.sidebar .menu li {
  margin: 15px 0;
}

.sidebar .menu li a {
  color: white;
  text-decoration: none;
  font-size: 16px;
  display: flex;
  align-items: center;
  transition: 0.3s;
}

.sidebar .menu li a i {
  margin-right: 10px;
}

.sidebar .menu li a:hover,
.sidebar .menu li a.active {
  background: #2a5298;
  padding: 8px;
  border-radius: 6px;
}

/* Main Content */
.main-content {
  margin-left: 250px;
  padding: 30px;
  width: calc(100% - 250px);
}

.dashboard-header {
  margin-bottom: 30px;
}

.dashboard-header h1 {
  font-size: 28px;
  color: #1e3c72;
}

.dashboard-header p {
  color: #666;
}

/* Sections Paramètres */
.settings-section {
  background: white;
  padding: 25px;
  margin-bottom: 30px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.settings-section h2 {
  font-size: 20px;
  color: #1e3c72;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
}

.settings-section h2 i {
  margin-right: 10px;
  color: #2a5298;
}

/* Formulaire */
.settings-form {
  display: flex;
  flex-direction: column;
}

.settings-form label {
  font-weight: bold;
  margin-bottom: 6px;
  color: #333;
}

.settings-form input,
.settings-form select {
  padding: 12px;
  margin-bottom: 18px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 15px;
  transition: border-color 0.3s;
}

.settings-form input:focus,
.settings-form select:focus {
  border-color: #2a5298;
  outline: none;
}

/* Bouton */
.btn-yellow {
  background: #d8c40d;
  color: black;
  border: none;
  padding: 12px;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  font-size: 16px;
  transition: background 0.3s;
}

.btn-yellow:hover {
  background: #c5b000;
}

/* Messages de confirmation */
.success-box {
  margin-top: 15px;
  padding: 15px;
  background: #d4edda;
  color: #155724;
  border-radius: 8px;
  font-weight: bold;
  text-align: center;
  font-size: 16px;
}

.error-box {
  margin-top: 15px;
  padding: 15px;
  background: #f8d7da;
  color: #721c24;
  border-radius: 8px;
  font-weight: bold;
  text-align: center;
  font-size: 16px;
}

/* Responsive */
@media (max-width: 768px) {
  .sidebar {
    width: 200px;
  }
  .main-content {
    margin-left: 200px;
    padding: 20px;
  }
}

@media (max-width: 576px) {
  .sidebar {
    position: relative;
    width: 100%;
    min-height: auto;
  }
  .main-content {
    margin-left: 0;
    width: 100%;
  }
}
</style>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <img src="logo.jpg" alt="JUCY ACADEMIE">
      <h2>JUCY ACADEMIE</h2>
    </div>
    <ul class="menu">
      <li><a href="dashboard.html"><i class="fas fa-home"></i> Accueil</a></li>
      <li><a href="formations.html"><i class="fas fa-book"></i> Formations</a></li>
      <li><a href="etudiants.html"><i class="fas fa-users"></i> Étudiants</a></li>
      <li><a href="rendezvous.html"><i class="fas fa-calendar-check"></i> Rendez-vous</a></li>
      <li><a href="paiement.html"><i class="fas fa-credit-card"></i> Paiements</a></li>
      <li><a href="messages.html"><i class="fas fa-envelope"></i> Messages</a></li>
      <li><a href="parametres.html" class="active"><i class="fas fa-cog"></i> Paramètres</a></li>
      <li><a href="connexion.html"><i class="fas fa-sign-out-alt"></i> Déconnexion</a></li>
    </ul>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="dashboard-header">
      <h1>Paramètres</h1>
      <p>Gérez vos informations et préférences</p>
    </header>

    <!-- Section Informations personnelles -->
    <section class="settings-section">
      <h2><i class="fas fa-user"></i> Informations personnelles</h2>
      <form class="settings-form">
        <label for="nom">Nom complet</label>
        <input type="text" id="nom" placeholder="Votre nom">

        <label for="email">Adresse email</label>
        <input type="email" id="email" placeholder="Votre email">

        <label for="telephone">Téléphone</label>
        <input type="tel" id="telephone" placeholder="Votre numéro">

        <button type="submit" class="btn-yellow">Mettre à jour</button>
      </form>
    </section>

    <!-- Section Préférences -->
    <section class="settings-section">
      <h2><i class="fas fa-sliders-h"></i> Préférences</h2>
      <form class="settings-form">
        <label for="langue">Langue</label>
        <select id="langue">
          <option>Français</option>
          <option>Anglais</option>
        </select>

        <label for="theme">Thème</label>
        <select id="theme">
          <option>Clair</option>
          <option>Sombre</option>
        </select>

        <button type="submit" class="btn-yellow">Enregistrer</button>
      </form>
    </section>

    <!-- Section Mot de passe -->
    <section class="settings-section">
      <h2><i class="fas fa-lock"></i> Sécurité</h2>
      <form class="settings-form">
        <label for="password">Nouveau mot de passe</label>
        <input type="password" id="password" placeholder="********">

        <label for="confirm-password">Confirmer mot de passe</label>
        <input type="password" id="confirm-password" placeholder="********">

        <button type="submit" class="btn-yellow">Changer le mot de passe</button>
      </form>
    </section>
  </main>

</body>
</html>
